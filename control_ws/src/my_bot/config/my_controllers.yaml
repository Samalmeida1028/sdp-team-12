controller_manager:
  ros__parameters:
    update_rate: 30
    use_sim_time: true

    diff_cont:
      type: diff_drive_controller/DiffDriveController
    
    joint_broad:
      type: joint_state_broadcaster/JointStateBroadcaster


diff_cont:
  ros__parameters:

    publish_rate: 30.0 # You can set this higher than the controller manager update rate, but it will be throttled
    base_frame_id: base_link

    left_wheel_names: ['drivewhl_lf_joint', 'drivewhl_lb_joint']
    right_wheel_names: ['drivewhl_rf_joint', 'drivewhl_rb_joint']
    wheel_separation: 0.4
    wheel_radius: 0.0508

    use_stamped_vel: false

